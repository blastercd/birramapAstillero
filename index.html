<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirraMap Astillero - Buscador de Precios</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --bg-dark: #121212; --card-bg: #1e1e1e; --white: #ffffff; }
        
        body { 
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; color: #f8f9fa;
        }

        h1, h3, h4, .modal-title { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; color: var(--gold); }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        
        .navbar { background: #2c1b0e !important; border-bottom: 3px solid var(--gold); }
        .visitas-badge { background: var(--gold); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; }

        #map { height: 500px; border-radius: 12px; border: 4px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .panel-pizarra { background: var(--bg-dark); border: 1px solid #444; border-radius: 15px; padding: 20px; }
        .card-ranking { background: var(--card-bg); border-left: 5px solid var(--gold); margin-bottom: 12px; }
        
        .price-badge { font-family: 'Permanent Marker', cursive; color: var(--gold); font-size: 1.8rem; }
        
        .btn-vamos { 
            background-color: var(--gold) !important; 
            color: black !important; 
            font-weight: 900; 
            border: none; 
            padding: 8px; 
            border-radius: 6px; 
            width: 100%; 
            display: block;
            text-align: center;
            text-decoration: none;
        }
        .btn-vamos:hover { background-color: white !important; color: black !important; }

        .btn-opinar { 
            color: var(--gold) !important; 
            border: 1px solid var(--gold) !important; 
            background: transparent !important; 
            font-size: 0.75rem; 
            font-weight: bold; 
            padding: 5px 10px; 
            border-radius: 5px;
            transition: all 0.2s ease-in-out;
        }
        .btn-opinar:hover { background-color: var(--gold) !important; color: black !important; }

        .form-control, .form-select { background-color: #2a2a2a !important; color: white !important; border: 1px solid #555 !important; }
        .form-control::placeholder { color: #888 !important; }
        
        .form-select option { background-color: #2a2a2a; color: white; }

        .modal-content { background-color: #1a1a1a; border: 2px solid var(--gold); color: white; }
        .comment-item { background: #2a2a2a; border-radius: 8px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        
        .hidden { display: none !important; }

        .floating-logo { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            background-image: url('logo.jpeg'); 
            background-size: cover; 
            background-position: center;
            border: 2px solid var(--gold); 
            z-index: 1000; 
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .floating-logo:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }

        .tapa-icon { cursor: help; margin-left: 5px; }

        .btn-maps-helper { background-color: #4285F4 !important; color: white !important; border: none; font-weight: bold; }
        .btn-maps-helper:hover { background-color: #357ae8 !important; }
        
        .leaflet-popup-content { color: #000; font-weight: bold; text-align: center; }
        .popup-precio { color: #d4af37; font-size: 1.1rem; display: block; }
        .popup-estrellas { color: #555; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1 fs-2" id="logo-beer" style="cursor:pointer">
            🍺 <span class="marker-font">BirraMap</span> Astillero
        </span>
        <div id="adminStats" class="hidden">
            <span class="visitas-badge">SESIONES: <span id="numVisitas">0</span></span>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <section id="seccionAdmin" class="hidden mb-4">
        <div class="panel-pizarra border-warning">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>MODO ADMINISTRADOR</h4>
                <button class="btn btn-danger btn-sm fw-bold" onclick="window.cerrarAdmin()">SALIR</button>
            </div>
            <form id="formBar" class="row g-2">
                <div class="col-md-3">
                    <label class="small text-warning">Nombre:</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Bar La Estación" required>
                </div>
                <div class="col-md-3">
                    <label class="small text-warning">Ubicación / Coordenadas:</label>
                    <div class="input-group">
                        <input type="text" id="direccion" class="form-control" placeholder="43.40, -3.82" required>
                        <button class="btn btn-maps-helper" type="button" onclick="window.open('https://www.google.com/maps')">🔍 MAPS</button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="small text-warning">Precio:</label>
                    <input type="number" id="precio" class="form-control" step="0.01" placeholder="2.50" required>
                </div>
                <div class="col-md-2">
                    <label class="small text-warning">¿Tapa?:</label>
                    <select id="tapa" class="form-select">
                        <option value="no">Sin Tapa</option>
                        <option value="si">Con Tapa 🍢</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning w-100 fw-bold">AÑADIR</button>
                </div>
            </form>
        </div>
    </section>

    <div class="row">
        <div class="col-lg-7"><div id="map" class="mb-4"></div></div>
        <div class="col-lg-5">
            <div class="panel-pizarra">
                <h3 class="text-center border-bottom border-secondary pb-2 mb-4">📋 RANKING CERVEZA MAS BARATA</h3>
                <div id="rankingLista" style="max-height: 650px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalReseñas" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="modalTituloBar">DETALLES</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row">
            <div class="col-md-5 border-end border-secondary">
                <h6 class="text-warning mb-3">DEJAR RESEÑA</h6>
                <input type="hidden" id="currentBarId">
                <div class="mb-2">
                    <label class="small">Nota:</label>
                    <select id="rating" class="form-select">
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="3">⭐⭐⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="1">⭐</option>
                    </select>
                </div>
                <div class="mb-2"><textarea id="textoComentario" class="form-control" rows="3" placeholder="Tu opinión..."></textarea></div>
                <div class="mb-3"><input type="file" id="fotoComentario" class="form-control form-control-sm" accept="image/*"></div>
                <button class="btn btn-warning w-100 fw-bold" onclick="window.guardarComentario()">PUBLICAR</button>
            </div>
            <div class="col-md-7">
                <h6 class="text-warning mb-3">OPINIONES</h6>
                <div id="contenedorComentariosReal"></div>
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="floating-logo" title="Blaster Creador Digital - blastercd@hotmail.com" onclick="window.enviarEmail()"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    // --- FIREBASE CONFIG ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // PEGA AQUÍ TUS DATOS DE FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO_ID",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const baresCol = collection(db, "baresasti");

    // --- VARIABLES GLOBALES ---
    const PASS_ADMIN = "astillero2026";
    let bares = [];
    let map, markers = [], esAdmin = false;

    // --- FUNCIONES EXPORTADAS A WINDOW (para que funcionen en el HTML) ---
    window.enviarEmail = () => { window.location.href = "mailto:blastercd@hotmail.com?subject=Consulta BirraMap Astillero"; };

    window.cerrarAdmin = () => {
        esAdmin = false;
        document.getElementById('seccionAdmin').classList.add('hidden');
        document.getElementById('adminStats').classList.add('hidden');
        renderDatos();
    };

    // --- CONTADOR DE VISITAS (EN FIREBASE) ---
    async function trackVisitas() {
        const statsRef = doc(db, "stats", "visitas");
        if (!sessionStorage.getItem('v-session')) {
            try {
                await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(statsRef);
                    if (!sfDoc.exists()) {
                        transaction.set(statsRef, { count: 1 });
                    } else {
                        const newCount = sfDoc.data().count + 1;
                        transaction.update(statsRef, { count: newCount });
                    }
                });
                sessionStorage.setItem('v-session', 'true');
            } catch (e) { console.error("Error contador:", e); }
        }
        // Escuchar el contador en tiempo real
        onSnapshot(statsRef, (doc) => {
            if (doc.exists()) document.getElementById('numVisitas').innerText = doc.data().count;
        });
    }

    // --- LÓGICA DEL MAPA ---
    function initMap() {
        map = L.map('map').setView([43.4017, -3.8214], 16);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);
        trackVisitas();
    }

    onSnapshot(baresCol, (snapshot) => {
        bares = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderDatos();
    });

    function obtenerMedia(comentarios) {
        if (!comentarios || comentarios.length === 0) return { texto: "Sin valoraciones", estrellas: "" };
        let suma = comentarios.reduce((acc, c) => acc + parseInt(c.rating), 0);
        let media = (suma / comentarios.length).toFixed(1);
        return { texto: media, estrellas: "⭐".repeat(Math.round(media)) };
    }

    function renderDatos() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const lista = document.getElementById('rankingLista');
        lista.innerHTML = '';
        const ordenados = [...bares].sort((a, b) => a.precio - b.precio);

        ordenados.forEach((bar, index) => {
            const valoracion = obtenerMedia(bar.comentarios);
            const m = L.marker([bar.lat, bar.lng]).addTo(map)
                      .bindPopup(`<b>${bar.nombre}</b><br><span class="popup-precio">${bar.precio.toFixed(2)}€</span><span class="popup-estrellas">${valoracion.estrellas}</span>`);
            markers.push(m);
            
            const tapaHtml = bar.tapa == 'si' ? '<span class="tapa-icon" title="Con tapa">🍢</span>' : '';
            const card = document.createElement('div');
            card.className = 'card card-ranking shadow-sm';
            card.innerHTML = `
                <div class="card-body p-3">
                    <div class="row align-items-center">
                        <div class="col-8" onclick="map.setView([${bar.lat}, ${bar.lng}], 18)" style="cursor:pointer">
                            <h6 class="mb-0 text-white fw-bold">${index + 1}. ${bar.nombre.toUpperCase()} ${tapaHtml}</h6>
                            <div class="mb-1" style="font-size:0.75rem; color:#d4af37;">${valoracion.estrellas} <span class="text-secondary">${valoracion.texto}</span></div>
                            <small class="text-secondary d-block mb-2">${bar.direccion}</small>
                            <button class="btn btn-opinar" onclick="event.stopPropagation(); window.verOpiniones('${bar.id}')">OPINIONES</button>
                        </div>
                        <div class="col-4 text-end">
                            <div class="price-badge mb-2">${bar.precio.toFixed(2)}€</div>
                            <button class="btn-vamos" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${bar.lat},${bar.lng}&travelmode=walking')">VAMOS</button>
                        </div>
                    </div>
                    ${esAdmin ? `<div class="mt-2 border-top border-secondary pt-2"><button class="btn btn-sm btn-outline-danger w-100" onclick="window.eliminarBar('${bar.id}')">Borrar Bar</button></div>` : ''}
                </div>
            `;
            lista.appendChild(card);
        });
    }

    // --- ACCIONES DE ADMIN ---
    document.getElementById('logo-beer').addEventListener('dblclick', () => {
        if(prompt("Clave Admin:") === PASS_ADMIN) {
            esAdmin = true;
            document.getElementById('seccionAdmin').classList.remove('hidden');
            document.getElementById('adminStats').classList.remove('hidden');
            renderDatos();
        }
    });

    document.getElementById('formBar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const inputDir = document.getElementById('direccion').value;
        let lat, lng, calle = inputDir;

        if (inputDir.includes(',')) {
            const parts = inputDir.split(',');
            lat = parseFloat(parts[0]); lng = parseFloat(parts[1]);
        } else {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(inputDir + ", Astillero")}&limit=1`);
            const data = await res.json();
            if(data[0]) { lat = parseFloat(data[0].lat); lng = parseFloat(data[0].lon); }
        }

        if(!lat) return alert("Ubicación no válida");

        await addDoc(baresCol, {
            nombre: document.getElementById('nombre').value,
            direccion: calle,
            precio: parseFloat(document.getElementById('precio').value),
            tapa: document.getElementById('tapa').value,
            lat, lng, comentarios: []
        });
        e.target.reset();
    });

    window.eliminarBar = async (id) => { if(confirm("¿Borrar bar?")) await deleteDoc(doc(db, "baresasti", id)); };

    // --- GESTIÓN DE RESEÑAS ---
    window.verOpiniones = (id) => {
        const bar = bares.find(b => b.id == id);
        document.getElementById('currentBarId').value = id;
        document.getElementById('modalTituloBar').innerText = bar.nombre.toUpperCase();
        dibujarComentarios(bar);
        new bootstrap.Modal(document.getElementById('modalReseñas')).show();
    };

    function dibujarComentarios(bar) {
        const contenedor = document.getElementById('contenedorComentariosReal');
        contenedor.innerHTML = bar.comentarios?.length ? '' : '<p class="text-muted small">Sin reseñas.</p>';
        bar.comentarios?.forEach((c, idx) => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `
                <div class="d-flex justify-content-between small"><span>${'⭐'.repeat(c.rating)}</span><span class="text-muted">${c.fecha}</span></div>
                <span class="d-block mt-2">${c.texto}</span>
                ${c.foto ? `<img src="${c.foto}" style="max-width:100%; border-radius:5px; margin-top:10px;">` : ''}
                ${esAdmin ? `<button class="btn btn-sm btn-danger mt-2 w-100" onclick="window.borrarReseña('${bar.id}', ${idx})">Borrar Reseña</button>` : ''}
            `;
            contenedor.appendChild(div);
        });
    }

    window.guardarComentario = async () => {
        const id = document.getElementById('currentBarId').value;
        const texto = document.getElementById('textoComentario').value;
        const rating = document.getElementById('rating').value;
        const fotoFile = document.getElementById('fotoComentario').files[0];
        
        if(!texto) return alert("Escribe algo.");

        const processSave = async (imgBase64 = null) => {
            const barRef = doc(db, "baresasti", id);
            await updateDoc(barRef, {
                comentarios: arrayUnion({ texto, rating, fecha: new Date().toLocaleDateString(), foto: imgBase64 })
            });
            document.getElementById('textoComentario').value = '';
            document.getElementById('fotoComentario').value = '';
            bootstrap.Modal.getInstance(document.getElementById('modalReseñas')).hide();
        };

        if(fotoFile) {
            const reader = new FileReader();
            reader.onload = (e) => processSave(e.target.result);
            reader.readAsDataURL(fotoFile);
        } else processSave();
    };

    window.borrarReseña = async (barId, idx) => {
        const bar = bares.find(b => b.id == barId);
        const reseña = bar.comentarios[idx];
        await updateDoc(doc(db, "baresasti", barId), { comentarios: arrayRemove(reseña) });
        dibujarComentarios(bares.find(b => b.id == barId));
    };

    window.onload = initMap;
</script>
</body>
</html>
