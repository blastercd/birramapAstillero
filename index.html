<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirraMap Astillero - Buscador de Precios</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { 
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; color: #f8f9fa;
        }
        h3, h4, .modal-title { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; color: var(--gold); }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .navbar { background: #2c1b0e !important; border-bottom: 3px solid var(--gold); }
        .visitas-badge { background: var(--gold); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        
        /* Contenedor del Mapa de Google */
        #map { height: 500px; border-radius: 12px; border: 4px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .panel-pizarra { background: var(--bg-dark); border: 1px solid #444; border-radius: 15px; padding: 20px; }
        .card-ranking { background: var(--card-bg); border-left: 5px solid var(--gold); margin-bottom: 12px; border-radius: 0 8px 8px 0; border: none; }
        .price-badge { font-family: 'Permanent Marker', cursive; color: var(--gold); font-size: 1.8rem; }
        
        .btn-vamos { 
            background-color: var(--gold) !important; color: black !important; font-weight: 900; 
            border: none; padding: 8px; border-radius: 6px; width: 100%; display: block;
            text-align: center; text-decoration: none;
        }
        .btn-opinar { color: var(--gold) !important; border: 1px solid var(--gold) !important; background: transparent; font-size: 0.75rem; font-weight: bold; padding: 5px 10px; border-radius: 5px; }
        
        .form-control, .form-select { background-color: #2a2a2a !important; color: white !important; border: 1px solid #555 !important; }
        .modal-content { background-color: #1a1a1a; border: 2px solid var(--gold); color: white; }
        .hidden { display: none !important; }
        
        /* Buscador de Google dentro de la Admin */
        #pac-input { margin-top: 10px; margin-bottom: 10px; }

        .floating-logo { 
            position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; border-radius: 50%; 
            background-image: url('logo.jpeg'); background-size: cover; border: 2px solid var(--gold); z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1 fs-2" id="logo-beer" style="cursor:pointer">
            🍺 <span class="marker-font">BirraMap</span> Astillero
        </span>
        <div id="adminStats" class="hidden">
            <span class="visitas-badge">SESIONES: <span id="numVisitas">0</span></span>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <section id="seccionAdmin" class="hidden mb-4">
        <div class="panel-pizarra border-warning">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>MODO ADMINISTRADOR - GOOGLE MAPS ACTIVO</h4>
                <button class="btn btn-danger btn-sm fw-bold" onclick="window.cerrarAdmin()">SALIR</button>
            </div>
            
            <div class="mb-3">
                <label class="text-warning small fw-bold">1. BUSCA EL BAR EN GOOGLE MAPS:</label>
                <input id="pac-input" class="form-control" type="text" placeholder="Escribe el nombre del bar o calle...">
            </div>

            <form id="formBar" class="row g-2">
                <div class="col-md-3">
                    <label class="text-white-50 small">Nombre</label>
                    <input type="text" id="nombre" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="text-white-50 small">Coordenadas (Auto)</label>
                    <input type="text" id="coords" class="form-control" placeholder="Lat, Lng" readonly required>
                </div>
                <div class="col-md-2">
                    <label class="text-white-50 small">Precio €</label>
                    <input type="number" id="precio" class="form-control" step="0.01" required>
                </div>
                <div class="col-md-2">
                    <label class="text-white-50 small">¿Tapa?</label>
                    <select id="tapa" class="form-select">
                        <option value="no">Sin Tapa</option>
                        <option value="si">Con Tapa 🍢</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning w-100 fw-bold">GUARDAR</button>
                </div>
            </form>
        </div>
    </section>

    <div class="row">
        <div class="col-lg-7"><div id="map" class="mb-4"></div></div>
        <div class="col-lg-5">
            <div class="panel-pizarra">
                <h3 class="text-center border-bottom border-secondary pb-2 mb-4">📋 RANKING DE PRECIOS</h3>
                <div id="rankingLista" style="max-height: 650px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalReseñas" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modalTituloBar">DETALLES</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-5 border-end border-secondary">
                        <h6 class="text-warning mb-3">DEJAR RESEÑA</h6>
                        <input type="hidden" id="currentBarId">
                        <select id="rating" class="form-select mb-2">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="2">⭐⭐</option>
                            <option value="1">⭐</option>
                        </select>
                        <textarea id="textoComentario" class="form-control mb-2" rows="3" placeholder="Tu opinión..."></textarea>
                        <input type="file" id="fotoComentario" class="form-control form-control-sm mb-3" accept="image/*">
                        <button class="btn btn-warning w-100 fw-bold" onclick="window.guardarComentario()">PUBLICAR</button>
                    </div>
                    <div class="col-md-7">
                        <h6 class="text-warning mb-3">OPINIONES</h6>
                        <div id="contenedorComentariosReal"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="floating-logo" onclick="window.enviarEmail()"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBQzxl9hDoaXdxHPaAnii_NPiI3jYHTw1Y&libraries=places"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBQzxl9hDoaXdxHPaAnii_NPiI3jYHTw1Y",
        authDomain: "baresasti.firebaseapp.com",
        projectId: "baresasti",
        storageBucket: "baresasti.firebasestorage.app",
        messagingSenderId: "525936483505",
        appId: "1:525936483505:web:d28cff79943cbec1291690",
        measurementId: "G-4FMKKP77ST"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const baresCol = collection(db, "baresasti");

    const PASS_ADMIN = "astillero2026";
    let bares = [];
    let googleMap, markers = [], esAdmin = false;

    // INICIALIZAR GOOGLE MAPS
    function initMap() {
        const astillero = { lat: 43.4017, lng: -3.8214 };
        googleMap = new google.maps.Map(document.getElementById("map"), {
            zoom: 16,
            center: astillero,
            styles: [ { "featureType": "all", "elementType": "all", "stylers": [ { "invert_lightness": true }, { "saturation": 10 }, { "lightness": 30 }, { "gamma": 0.5 }, { "hue": "#435158" } ] } ]
        });

        // Configurar el buscador de Google (Autocomplete)
        const input = document.getElementById("pac-input");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.bindTo("bounds", googleMap);

        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.location) return;

            googleMap.setCenter(place.geometry.location);
            googleMap.setZoom(18);

            // Rellenar automáticamente los campos de admin
            if(esAdmin) {
                document.getElementById('nombre').value = place.name;
                document.getElementById('coords').value = `${place.geometry.location.lat()}, ${place.geometry.location.lng()}`;
            }
        });

        trackVisitas();
    }

    onSnapshot(baresCol, (snapshot) => {
        bares = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderDatos();
    });

    function renderDatos() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        const lista = document.getElementById('rankingLista');
        lista.innerHTML = '';
        const ordenados = [...bares].sort((a, b) => a.precio - b.precio);

        ordenados.forEach((bar, index) => {
            const val = obtenerMedia(bar.comentarios);
            
            // Crear Marcador en Google Maps
            const marker = new google.maps.Marker({
                position: { lat: bar.lat, lng: bar.lng },
                map: googleMap,
                title: bar.nombre
            });
            const infoWindow = new google.maps.InfoWindow({
                content: `<b>${bar.nombre}</b><br>${bar.precio.toFixed(2)}€`
            });
            marker.addListener("click", () => infoWindow.open(googleMap, marker));
            markers.push(marker);
            
            const card = document.createElement('div');
            card.className = 'card card-ranking shadow-sm';
            card.innerHTML = `
                <div class="card-body p-3">
                    <div class="row align-items-center">
                        <div class="col-7" onclick="googleMap.setCenter({lat: ${bar.lat}, lng: ${bar.lng}}); googleMap.setZoom(18)" style="cursor:pointer">
                            <h6 class="mb-0 text-white fw-bold">${index + 1}. ${bar.nombre.toUpperCase()} ${bar.tapa=='si'?'🍢':''}</h6>
                            <div style="font-size:0.75rem; color:#d4af37;">${val.estrellas} (${val.texto})</div>
                            <button class="btn btn-opinar mt-2" onclick="event.stopPropagation(); window.verOpiniones('${bar.id}')">OPINIONES</button>
                        </div>
                        <div class="col-5 text-end">
                            <div class="price-badge">${bar.precio.toFixed(2)}€</div>
                            <a class="btn-vamos mt-2" href="https://www.google.com/maps/dir/?api=1&destination=${bar.lat},${bar.lng}&travelmode=walking" target="_blank">VAMOS</a>
                        </div>
                    </div>
                    ${esAdmin ? `<button class="btn btn-sm btn-outline-danger w-100 mt-2" onclick="window.eliminarBar('${bar.id}')">Borrar Bar</button>` : ''}
                </div>`;
            lista.appendChild(card);
        });
    }

    // Guardar en Firebase
    document.getElementById('formBar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const coords = document.getElementById('coords').value.split(',');
        const lat = parseFloat(coords[0]);
        const lng = parseFloat(coords[1]);

        await addDoc(baresCol, {
            nombre: document.getElementById('nombre').value,
            precio: parseFloat(document.getElementById('precio').value),
            tapa: document.getElementById('tapa').value,
            lat, lng, comentarios: []
        });
        e.target.reset();
        document.getElementById('pac-input').value = '';
        alert("¡Bar guardado!");
    });

    // --- El resto de funciones (Visitas, Opiniones, etc.) se mantienen igual ---
    function obtenerMedia(comentarios) {
        if (!comentarios || comentarios.length === 0) return { texto: "0.0", estrellas: "☆☆☆☆☆" };
        let suma = comentarios.reduce((acc, c) => acc + parseInt(c.rating), 0);
        let media = (suma / comentarios.length).toFixed(1);
        return { texto: media, estrellas: "⭐".repeat(Math.round(media)) };
    }

    async function trackVisitas() {
        const statsRef = doc(db, "stats", "visitas");
        try {
            const docSnap = await getDoc(statsRef);
            if (!sessionStorage.getItem('v-session')) {
                if (!docSnap.exists()) await setDoc(statsRef, { count: 1 });
                else await updateDoc(statsRef, { count: docSnap.data().count + 1 });
                sessionStorage.setItem('v-session', 'true');
            }
        } catch (e) {}
        onSnapshot(statsRef, (doc) => { if (doc.exists()) document.getElementById('numVisitas').innerText = doc.data().count; });
    }

    document.getElementById('logo-beer').addEventListener('dblclick', () => {
        if(prompt("Clave:") === PASS_ADMIN) {
            esAdmin = true;
            document.getElementById('seccionAdmin').classList.remove('hidden');
            document.getElementById('adminStats').classList.remove('hidden');
            renderDatos();
        }
    });

    window.cerrarAdmin = () => { esAdmin = false; document.getElementById('seccionAdmin').classList.add('hidden'); document.getElementById('adminStats').classList.add('hidden'); renderDatos(); };
    window.verOpiniones = (id) => {
        const bar = bares.find(b => b.id == id);
        document.getElementById('currentBarId').value = id;
        document.getElementById('modalTituloBar').innerText = bar.nombre.toUpperCase();
        dibujarComentarios(bar);
        new bootstrap.Modal(document.getElementById('modalReseñas')).show();
    };
    function dibujarComentarios(bar) {
        const contenedor = document.getElementById('contenedorComentariosReal');
        contenedor.innerHTML = bar.comentarios?.length ? '' : '<p class="text-muted">Aún no hay opiniones.</p>';
        bar.comentarios?.forEach((c, idx) => {
            const div = document.createElement('div');
            div.className = 'comment-item bg-dark border-secondary mb-2 p-2 rounded';
            div.innerHTML = `<strong>${'⭐'.repeat(c.rating)}</strong> - <small>${c.fecha}</small><br>${c.texto}
            ${c.foto ? `<img src="${c.foto}" style="width:100%; margin-top:10px; border-radius:5px;">` : ''}
            ${esAdmin ? `<button class="btn btn-sm btn-danger d-block mt-2" onclick="window.borrarReseña('${bar.id}', ${idx})">Borrar</button>` : ''}`;
            contenedor.appendChild(div);
        });
    }
    window.guardarComentario = async () => {
        const id = document.getElementById('currentBarId').value;
        const texto = document.getElementById('textoComentario').value;
        const rating = document.getElementById('rating').value;
        const fotoFile = document.getElementById('fotoComentario').files[0];
        if(!texto) return alert("Escribe algo");
        const save = async (img = null) => {
            await updateDoc(doc(db, "baresasti", id), { comentarios: arrayUnion({ texto, rating, fecha: new Date().toLocaleDateString(), foto: img }) });
            document.getElementById('textoComentario').value = '';
            bootstrap.Modal.getInstance(document.getElementById('modalReseñas')).hide();
        };
        if(fotoFile) { const reader = new FileReader(); reader.onload = (e) => save(e.target.result); reader.readAsDataURL(fotoFile); } else save();
    };
    window.eliminarBar = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "baresasti", id)); };
    window.enviarEmail = () => { window.location.href = "mailto:blastercd@hotmail.com"; };
    
    // Iniciar todo
    window.onload = initMap;
</script>
</body>
</html>
