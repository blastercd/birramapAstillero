<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BirraMap Astillero PRO</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --bg-dark: #121212; --card-bg: #1e1e1e; }
        
        body { 
            font-family: 'Roboto', sans-serif;
            background: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; color: #eee;
        }

        .navbar { background: #1a0f08 !important; border-bottom: 2px solid var(--gold); }
        .navbar-brand { font-family: 'Bebas Neue', cursive; font-size: 1.5rem !important; }

        #map { height: 40vh; min-height: 300px; width: 100%; border-bottom: 3px solid var(--gold); z-index: 1; }

        .panel-pizarra { 
            background: rgba(15, 15, 15, 0.98); 
            border-radius: 20px; 
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #333;
        }

        /* --- CORRECCIÓN INPUTS (ADMIN Y MODAL) --- */
        .form-control, .form-select { 
            background-color: #222 !important; 
            color: #ffffff !important; 
            border: 1px solid var(--gold) !important;
            padding: 12px;
        }
        /* Para que se vea lo que escribes */
        textarea.form-control, input.form-control {
            color: #ffffff !important;
        }
        .form-control::placeholder { color: #777 !important; }

        .admin-label { color: var(--gold); font-weight: bold; font-size: 0.8rem; margin-bottom: 4px; display: block; }

        .card-ranking { 
            background: #1a1a1a; 
            border: 1px solid #333;
            border-left: 4px solid var(--gold); 
            margin-bottom: 12px; 
            border-radius: 8px;
        }

        .price-container { display: flex; flex-direction: column; align-items: center; }
        .price-badge { font-family: 'Permanent Marker', cursive; color: #ffcc00; font-size: 1.7rem; line-height: 1; margin-bottom: 5px; text-shadow: 2px 2px 0px #000; }

        .btn-vamos { 
            background: var(--gold); color: #000; font-weight: 900; 
            text-decoration: none; display: block; text-align: center; 
            padding: 6px 15px; border-radius: 6px; font-size: 0.85rem;
            width: 100%; text-transform: uppercase;
        }

        .btn-opinar { 
            color: #fff !important; background: rgba(212, 175, 55, 0.2) !important;
            border: 1px solid var(--gold) !important; 
            font-size: 0.75rem; font-weight: bold;
            padding: 8px 15px; border-radius: 6px; margin-top: 8px;
        }

        /* --- POPUPS DEL MAPA (MÁXIMA VISIBILIDAD) --- */
        .leaflet-popup-content-wrapper { background: #000 !important; color: #fff !important; border: 2px solid var(--gold); }
        .leaflet-popup-tip { background: var(--gold) !important; }
        .popup-bar-name { font-family: 'Bebas Neue'; font-size: 1.3rem; color: var(--gold); display: block; }
        .popup-bar-price { font-family: 'Permanent Marker'; font-size: 1.5rem; color: #fff; display: block; margin-top: 5px; }

        /* --- MODAL Y RESEÑAS --- */
        .modal-content { background-color: #111; border: 2px solid var(--gold); }
        .comment-item { 
            background: #1d1d1d; border-radius: 10px; padding: 15px; 
            margin-bottom: 12px; border: 1px solid #333;
        }
        .comment-text { color: #ffffff !important; font-weight: 400; font-size: 0.95rem; }

        .floating-logo { 
            position: fixed; bottom: 20px; left: 20px; width: 55px; height: 55px; 
            border-radius: 50%; background-image: url('logo.jpeg'); background-size: cover; 
            border: 2px solid var(--gold); z-index: 999;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1" id="logo-beer" style="cursor:pointer">
            🍺 <span class="marker-font">BirraMap</span> <small style="font-size: 0.7em; color: var(--gold)">PRO</small>
        </span>
        <div id="adminStats" class="hidden text-end">
            <span class="badge bg-warning text-dark">VISITAS: <span id="numVisitas">0</span></span>
        </div>
    </div>
</nav>

<div id="map"></div>

<div class="container pb-5">
    <section id="seccionAdmin" class="hidden mt-3 mb-4">
        <div class="panel-pizarra border-warning">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="m-0 text-warning">PANEL DE CONTROL</h4>
                <button class="btn btn-danger btn-sm fw-bold" onclick="window.cerrarAdmin()">CERRAR</button>
            </div>
            <form id="formBar" class="row g-3">
                <div class="col-12"><label class="admin-label">NOMBRE DEL ESTABLECIMIENTO</label><input type="text" id="nombre" class="form-control" placeholder="Ej: Bar El Puerto" required></div>
                <div class="col-12"><label class="admin-label">DIRECCIÓN O COORDENADAS</label><div class="input-group"><input type="text" id="direccion" class="form-control" placeholder="Ej: Calle San José 12" required><a href="https://www.google.com/maps" target="_blank" class="btn btn-outline-warning">MAPS</a></div></div>
                <div class="col-6"><label class="admin-label">PRECIO CERVEZA (€)</label><input type="number" id="precio" class="form-control" step="0.01" placeholder="2.50" required></div>
                <div class="col-6"><label class="admin-label">¿TAPA?</label><select id="tapa" class="form-select"><option value="no">No</option><option value="si">Sí 🍢</option></select></div>
                <div class="col-12 mt-4"><button type="submit" class="btn btn-warning w-100 fw-bold py-2">AÑADIR LOCAL</button></div>
            </form>
        </div>
    </section>

    <div class="row">
        <div class="col-12">
            <div class="panel-pizarra">
                <h3 class="text-center mb-4"><span style="border-bottom: 2px solid var(--gold)">RANKING PRECIOS</span></h3>
                <div id="rankingLista"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalReseñas" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen-sm-down modal-lg">
        <div class="modal-content text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-warning" id="modalTituloBar">DETALLES</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-5 mb-4 border-end border-secondary">
                        <h6 class="text-warning mb-3">OPINAR</h6>
                        <input type="hidden" id="currentBarId">
                        <label class="small text-white-50">Nota:</label>
                        <select id="rating" class="form-select mb-2">
                            <option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option>
                        </select>
                        <label class="small text-white-50">Tu comentario:</label>
                        <textarea id="textoComentario" class="form-control mb-2" rows="3" placeholder="Escribe aquí..."></textarea>
                        <label class="small text-white-50">Foto:</label>
                        <input type="file" id="fotoComentario" class="form-control form-control-sm mb-3" accept="image/*">
                        <button class="btn btn-warning w-100 fw-bold py-2" onclick="window.guardarComentario()">PUBLICAR</button>
                    </div>
                    <div class="col-md-7">
                        <h6 class="text-warning mb-3">OPINIONES</h6>
                        <div id="contenedorComentariosReal"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="floating-logo" onclick="window.location.href='mailto:blastercd@hotmail.com'"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBQzxl9hDoaXdxHPaAnii_NPiI3jYHTw1Y",
        authDomain: "baresasti.firebaseapp.com",
        projectId: "baresasti",
        storageBucket: "baresasti.firebasestorage.app",
        messagingSenderId: "525936483505",
        appId: "1:525936483505:web:d28cff79943cbec1291690"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const baresCol = collection(db, "baresasti");

    let bares = [];
    let map, markers = [], esAdmin = false;

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([43.4017, -3.8214], 16);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        trackVisitas();
    }

    onSnapshot(baresCol, (snapshot) => {
        bares = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderDatos();
    });

    function renderDatos() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const lista = document.getElementById('rankingLista');
        lista.innerHTML = '';
        const ordenados = [...bares].sort((a, b) => a.precio - b.precio);

        ordenados.forEach((bar, index) => {
            const val = obtenerMedia(bar.comentarios);
            const popupContent = `<div class="text-center"><span class="popup-bar-name">${bar.nombre.toUpperCase()}</span><span class="popup-bar-price">${bar.precio.toFixed(2)}€</span></div>`;
            const m = L.marker([bar.lat, bar.lng]).addTo(map).bindPopup(popupContent);
            markers.push(m);
            
            const card = document.createElement('div');
            card.className = 'card card-ranking';
            card.innerHTML = `
                <div class="card-body p-3">
                    <div class="row align-items-center">
                        <div class="col-7 text-start" onclick="focusBar(${bar.lat}, ${bar.lng})" style="cursor:pointer">
                            <h6 class="mb-0 text-white fw-bold">${index + 1}. ${bar.nombre.toUpperCase()} ${bar.tapa=='si'?'🍢':''}</h6>
                            <div style="font-size:0.75rem; color:var(--gold);">${val.estrellas} (${val.texto})</div>
                            <button class="btn btn-opinar" onclick="event.stopPropagation(); window.verOpiniones('${bar.id}')">OPINIONES</button>
                        </div>
                        <div class="col-5 price-container text-end">
                            <div class="price-badge">${bar.precio.toFixed(2)}€</div>
                            <button class="btn-vamos" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${bar.lat},${bar.lng}&travelmode=walking')">VAMOS</button>
                        </div>
                    </div>
                    ${esAdmin ? `<div class="mt-2 pt-2 border-top border-secondary"><button class="btn btn-sm btn-danger w-100" onclick="window.borrarBar('${bar.id}')">BORRAR</button></div>` : ''}
                </div>
            `;
            lista.appendChild(card);
        });
    }

    window.focusBar = (lat, lng) => { map.setView([lat, lng], 18); window.scrollTo({ top: 0, behavior: 'smooth' }); };

    function obtenerMedia(com) {
        if (!com || com.length === 0) return { texto: "0.0", estrellas: "☆☆☆☆☆" };
        let suma = com.reduce((acc, c) => acc + parseInt(c.rating), 0);
        let media = (suma / com.length).toFixed(1);
        return { texto: media, estrellas: "⭐".repeat(Math.round(media)) };
    }

    window.verOpiniones = (id) => {
        const bar = bares.find(b => b.id == id);
        document.getElementById('currentBarId').value = id;
        document.getElementById('modalTituloBar').innerText = bar.nombre.toUpperCase();
        dibujarComentarios(bar);
        new bootstrap.Modal(document.getElementById('modalReseñas')).show();
    };

    function dibujarComentarios(bar) {
        const contenedor = document.getElementById('contenedorComentariosReal');
        contenedor.innerHTML = bar.comentarios?.length ? '' : '<p class="text-white-50 small">Sin opiniones aún.</p>';
        bar.comentarios?.forEach((c, idx) => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `
                <div class="d-flex justify-content-between small mb-1"><span class="text-warning">${'⭐'.repeat(c.rating)}</span><span class="text-muted">${c.fecha}</span></div>
                <div class="comment-text">${c.texto}</div>
                ${c.foto ? `<img src="${c.foto}" style="width:100%; border-radius:8px; margin-top:10px; border:1px solid #444;">` : ''}
                ${esAdmin ? `<button class="btn btn-sm btn-danger mt-2 w-100" onclick="window.borrarReseña('${bar.id}', ${idx})">Borrar</button>` : ''}
            `;
            contenedor.appendChild(div);
        });
    }

    window.guardarComentario = async () => {
        const id = document.getElementById('currentBarId').value;
        const texto = document.getElementById('textoComentario').value;
        const rating = document.getElementById('rating').value;
        const file = document.getElementById('fotoComentario').files[0];
        if(!texto) return;
        const save = async (img = null) => {
            await updateDoc(doc(db, "baresasti", id), { comentarios: arrayUnion({ texto, rating, fecha: new Date().toLocaleDateString(), foto: img }) });
            document.getElementById('textoComentario').value = '';
            document.getElementById('fotoComentario').value = '';
            dibujarComentarios(bares.find(b => b.id == id));
        };
        if(file) { const reader = new FileReader(); reader.onload = (e) => save(e.target.result); reader.readAsDataURL(file); } else save();
    };

    document.getElementById('formBar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const dir = document.getElementById('direccion').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dir + ", Astillero")}`);
        const data = await res.json();
        if(data[0]) { 
            await addDoc(baresCol, { nombre: document.getElementById('nombre').value, precio: parseFloat(document.getElementById('precio').value), tapa: document.getElementById('tapa').value, lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), comentarios: [] });
            e.target.reset();
        } else alert("No se encontró la dirección");
    });

    document.getElementById('logo-beer').addEventListener('dblclick', () => {
        if(prompt("Clave Admin:") === "astillero2026") {
            esAdmin = true;
            document.getElementById('seccionAdmin').classList.remove('hidden');
            document.getElementById('adminStats').classList.remove('hidden');
            renderDatos();
        }
    });

    window.cerrarAdmin = () => { esAdmin = false; document.getElementById('seccionAdmin').classList.add('hidden'); document.getElementById('adminStats').classList.add('hidden'); renderDatos(); };
    window.borrarBar = async (id) => { if(confirm("¿Eliminar bar?")) await deleteDoc(doc(db, "baresasti", id)); };
    window.borrarReseña = async (barId, idx) => {
        const bar = bares.find(b => b.id == barId);
        await updateDoc(doc(db, "baresasti", barId), { comentarios: arrayRemove(bar.comentarios[idx]) });
    };

    async function trackVisitas() {
        const statsRef = doc(db, "stats", "visitas");
        try {
            const docSnap = await getDoc(statsRef);
            if (!sessionStorage.getItem('v-pro')) {
                if (!docSnap.exists()) await setDoc(statsRef, { count: 1 });
                else await updateDoc(statsRef, { count: docSnap.data().count + 1 });
                sessionStorage.setItem('v-pro', '1');
            }
        } catch (e) {}
        onSnapshot(statsRef, d => { if(d.exists()) document.getElementById('numVisitas').innerText = d.data().count; });
    }

    window.onload = initMap;
</script>
</body>
</html>
