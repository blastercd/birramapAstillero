<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirraMap Astillero</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { 
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; color: #f8f9fa;
        }
        h3, h4 { font-family: 'Bebas Neue', cursive; color: var(--gold); }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .navbar { background: #2c1b0e !important; border-bottom: 3px solid var(--gold); }
        #map { height: 450px; border-radius: 12px; border: 3px solid #333; z-index: 1; }
        .panel-pizarra { background: var(--bg-dark); border: 1px solid #444; border-radius: 15px; padding: 20px; }
        .card-ranking { background: var(--card-bg); border-left: 5px solid var(--gold); margin-bottom: 12px; border: none; }
        .price-badge { font-family: 'Permanent Marker', cursive; color: var(--gold); font-size: 1.8rem; }
        .btn-vamos { background: var(--gold); color: black; font-weight: bold; text-decoration: none; display: block; text-align: center; padding: 8px; border-radius: 6px; }
        .form-control, .form-select { background-color: #2a2a2a !important; color: white !important; border: 1px solid #555 !important; }
        .hidden { display: none !important; }
        .floating-logo { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; border-radius: 50%; background-image: url('logo.jpeg'); background-size: cover; border: 2px solid var(--gold); z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1 fs-2" id="logo-beer" style="cursor:pointer">
            🍺 <span class="marker-font">BirraMap</span> Astillero
        </span>
        <div id="adminStats" class="hidden">
            <span class="badge bg-warning text-dark">SESIONES: <span id="numVisitas">0</span></span>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <section id="seccionAdmin" class="hidden mb-4">
        <div class="panel-pizarra border-warning">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>MODO ADMINISTRADOR</h4>
                <button class="btn btn-danger btn-sm" onclick="window.cerrarAdmin()">CERRAR</button>
            </div>
            
            <form id="formBar" class="row g-2">
                <div class="col-md-3">
                    <label class="small text-white-50">Nombre del Bar</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Ej: Bar El Puerto" required>
                </div>
                <div class="col-md-3">
                    <label class="small text-white-50">Ubicación / Coordenadas</label>
                    <div class="input-group">
                        <input type="text" id="direccion" class="form-control" placeholder="Ej: 43.40, -3.82" required>
                        <a href="https://www.google.com/maps" target="_blank" class="btn btn-outline-warning">MAPS</a>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="small text-white-50">Precio</label>
                    <input type="number" id="precio" class="form-control" step="0.01" placeholder="Ej: 2.50" required>
                </div>
                <div class="col-md-2">
                    <label class="small text-white-50">Tapa</label>
                    <select id="tapa" class="form-select">
                        <option value="no">Sin Tapa</option>
                        <option value="si">Con Tapa 🍢</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning w-100 fw-bold">AÑADIR</button>
                </div>
            </form>
        </div>
    </section>

    <div class="row">
        <div class="col-lg-7"><div id="map" class="mb-4"></div></div>
        <div class="col-lg-5">
            <div class="panel-pizarra">
                <h3 class="text-center mb-4">📋 RANKING PRECIOS</h3>
                <div id="rankingLista" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<div class="floating-logo" onclick="window.location.href='mailto:blastercd@hotmail.com'"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBQzxl9hDoaXdxHPaAnii_NPiI3jYHTw1Y",
        authDomain: "baresasti.firebaseapp.com",
        projectId: "baresasti",
        storageBucket: "baresasti.firebasestorage.app",
        messagingSenderId: "525936483505",
        appId: "1:525936483505:web:d28cff79943cbec1291690"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const baresCol = collection(db, "baresasti");

    let map, markers = [], esAdmin = false;

    // MAPA BÁSICO ANTERIOR
    function initMap() {
        map = L.map('map').setView([43.4017, -3.8214], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png').addTo(map);
        
        // Cargar contador de visitas
        trackVisitas();
    }

    onSnapshot(baresCol, (snapshot) => {
        const bares = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderDatos(bares);
    });

    function renderDatos(bares) {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const lista = document.getElementById('rankingLista');
        lista.innerHTML = '';
        
        const ordenados = bares.sort((a, b) => a.precio - b.precio);

        ordenados.forEach((bar, index) => {
            const m = L.marker([bar.lat, bar.lng]).addTo(map).bindPopup(bar.nombre);
            markers.push(m);
            
            const card = document.createElement('div');
            card.className = 'card card-ranking p-3';
            card.innerHTML = `
                <div class="row align-items-center">
                    <div class="col-7" onclick="map.setView([${bar.lat}, ${bar.lng}], 18)" style="cursor:pointer">
                        <h6 class="mb-0 text-white">${index + 1}. ${bar.nombre.toUpperCase()} ${bar.tapa=='si'?'🍢':''}</h6>
                    </div>
                    <div class="col-5 text-end">
                        <div class="price-badge">${bar.precio.toFixed(2)}€</div>
                        <a class="btn-vamos" href="https://www.google.com/maps/search/?api=1&query=${bar.lat},${bar.lng}" target="_blank">VAMOS</a>
                    </div>
                </div>
                ${esAdmin ? `<button class="btn btn-sm btn-outline-danger mt-2" onclick="window.borrarBar('${bar.id}')">Borrar</button>` : ''}
            `;
            lista.appendChild(card);
        });
    }

    // Lógica para añadir bar
    document.getElementById('formBar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const dir = document.getElementById('direccion').value;
        let lat, lng;

        if(dir.includes(',')) {
            [lat, lng] = dir.split(',').map(n => parseFloat(n.trim()));
        } else {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dir}, Astillero`);
            const data = await res.json();
            if(data[0]) { lat = parseFloat(data[0].lat); lng = parseFloat(data[0].lon); }
        }

        if(lat && lng) {
            await addDoc(baresCol, {
                nombre: document.getElementById('nombre').value,
                precio: parseFloat(document.getElementById('precio').value),
                tapa: document.getElementById('tapa').value,
                lat, lng
            });
            e.target.reset();
        } else { alert("Dirección no encontrada"); }
    });

    // Administración
    document.getElementById('logo-beer').addEventListener('dblclick', () => {
        if(prompt("Clave:") === "astillero2026") {
            esAdmin = true;
            document.getElementById('seccionAdmin').classList.remove('hidden');
            document.getElementById('adminStats').classList.remove('hidden');
        }
    });

    window.cerrarAdmin = () => { esAdmin = false; document.querySelector('.hidden').classList.add('hidden'); };
    window.borrarBar = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "baresasti", id)); };

    async function trackVisitas() {
        const statsRef = doc(db, "stats", "visitas");
        const docSnap = await getDoc(statsRef);
        if (!sessionStorage.getItem('v')) {
            if (!docSnap.exists()) await setDoc(statsRef, { count: 1 });
            else await updateDoc(statsRef, { count: docSnap.data().count + 1 });
            sessionStorage.setItem('v', '1');
        }
        onSnapshot(statsRef, d => { if(d.exists()) document.getElementById('numVisitas').innerText = d.data().count; });
    }

    window.onload = initMap;
</script>
</body>
</html>
